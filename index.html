<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tết Bính Ngọ 2026 - Đêm Hội Lung Linh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Charm:wght@700&family=Cinzel:wght@700&family=Pangolin&display=swap');

        body { margin: 0; overflow: hidden; background: #000; cursor: none; }

        /* CON TRỎ CHUỘT */
        #cursor {
            position: fixed; width: 20px; height: 20px;
            background: rgba(255, 215, 0, 0.5); border-radius: 50%;
            pointer-events: none; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ffd700; z-index: 9999; transition: width 0.1s, height 0.1s;
        }
        #cursor.clicking { width: 30px; height: 30px; background: rgba(255, 255, 255, 0.8); box-shadow: 0 0 20px #fff; }

        /* MÀN HÌNH CHỜ */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #5e0000, #1a0000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 0.8s ease-in-out; cursor: default;
        }
        .envelope {
            width: 180px; height: 260px; background: #c62828; border-radius: 12px;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center;
            border: 2px solid #ffeb3b; animation: float 3s infinite ease-in-out; cursor: pointer;
        }
        .envelope:before { content: ""; position: absolute; top: 0; border-left: 90px solid transparent; border-right: 90px solid transparent; border-top: 110px solid #e53935; }
        .seal { width: 70px; height: 70px; background: #ffd700; border-radius: 50%; position: absolute; top: 80px; display: flex; justify-content: center; align-items: center; font-family: 'Cinzel'; font-weight: bold; color: #b71c1c; font-size: 24px; box-shadow: 0 0 15px #ffd700; z-index: 2; }
        .hint { margin-top: 30px; color: #ffd700; font-family: 'Charm'; font-size: 24px; animation: pulse 1s infinite; }

        /* MÀN HÌNH CHÍNH */
        #main-scene {
            display: none; width: 100%; height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            position: relative; overflow: hidden;
        }
        #fireworksCanvas { position: absolute; top: 0; left: 0; z-index: 5; }
        .city-svg { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 10; fill: #050505; pointer-events: none; }
        
        /* Chữ */
        .text-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; width: 100%; pointer-events: none; }
        .line-1 { font-family: 'Charm', cursive; font-size: 4rem; color: #fff; text-shadow: 0 0 20px #ff00de; opacity: 0; animation: fadeUp 1.5s forwards 0.5s; }
        .line-2 { 
            font-family: 'Cinzel', serif; font-size: 8rem; line-height: 1; margin: 10px 0;
            background: linear-gradient(to bottom, #fff9c4 0%, #ffd700 50%, #ff8f00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); opacity: 0; animation: zoomIn 1s forwards 1.2s;
        }
        .line-3 { font-family: 'Pangolin', cursive; font-size: 2.5rem; color: #ffeb3b; text-shadow: 0 0 10px #ff6f00; opacity: 0; animation: fadeUp 1.5s forwards 1.8s; height: 50px;}

        /* NGỰA CHẠY */
        .horse-container {
            position: absolute; bottom: 20px; z-index: 12;
            filter: drop-shadow(0 0 10px #ffd700); pointer-events: none;
            transition: transform 0.3s ease-in-out; transform: scaleX(-1); will-change: left, transform;
        }
        .horse { font-size: 60px; }
        
        /* CÁC HIỆU ỨNG NHỎ */
        .floating-text { position: absolute; color: #ffd700; font-family: 'Charm'; font-weight: bold; font-size: 24px; pointer-events: none; animation: floatUp 1.5s ease-out forwards; z-index: 50; text-shadow: 0 0 5px #ff0000; }
        .trail { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; pointer-events: none; animation: fadeOut 0.8s linear forwards; z-index: 9998; box-shadow: 0 0 5px #fff; }
        .falling-item { position: absolute; top: -50px; z-index: 8; animation: fall linear forwards; }

        /* MỚI: SAO LẤP LÁNH & BOKEH */
        #star-container { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; pointer-events: none;}
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle infinite alternate; }
        .bokeh { position: absolute; border-radius: 50%; opacity: 0.15; filter: blur(10px); animation: bokehFloat infinite alternate ease-in-out; z-index: 2; pointer-events: none;}

        /* MỚI: CLICK RIPPLE */
        .ripple {
            position: absolute; border-radius: 50%; border: 2px solid rgba(255, 215, 0, 0.8);
            animation: rippleEffect 0.6s linear forwards; pointer-events: none; z-index: 9990; transform: translate(-50%, -50%);
        }

        /* Animations */
        @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-15px);} }
        @keyframes pulse { 0%{opacity:0.6;} 50%{opacity:1;} 100%{opacity:0.6;} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
        @keyframes zoomIn { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
        @keyframes floatUp { 0%{opacity:1; transform:translate(-50%,0) scale(1);} 100%{opacity:0; transform:translate(-50%,-80px) scale(1.5);} }
        @keyframes fadeOut { 0%{opacity:1; transform:scale(1);} 100%{opacity:0; transform:scale(0);} }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        @keyframes bokehFloat { 0% { transform: translate(0, 0); } 100% { transform: translate(20px, -20px); } }
        @keyframes rippleEffect { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 100px; height: 100px; opacity: 0; } }

        @media (max-width: 768px) { .line-1{font-size:2.5rem} .line-2{font-size:5rem} .line-3{font-size:1.8rem} .horse{font-size:40px} }
    </style>
</head>
<body>
    
    <div id="cursor"></div>

    <div id="start-screen" onclick="startTet()">
        <div class="envelope-container"><div class="envelope"><div class="seal">Mở</div></div></div>
        <div class="hint">Nhấn lì xì - Đón năm mới</div>
    </div>

    <div id="main-scene">
        <div id="star-container"></div> <canvas id="fireworksCanvas"></canvas>
        <svg class="city-svg" viewBox="0 0 1200 300" preserveAspectRatio="none"><path d="M0,300 L0,250 L50,250 L50,180 L100,180 L100,260 L150,260 L150,120 L220,120 L220,270 L280,270 L280,200 L350,200 L350,280 L420,280 L420,150 L500,150 L500,260 L580,260 L580,290 L650,290 L650,50 L720,50 L720,280 L800,280 L800,140 L880,140 L880,280 L950,280 L950,200 L1050,200 L1050,290 L1200,290 L1200,300 Z" /></svg>
        
        <div class="text-container">
            <div class="line-1">Xuân Bính Ngọ</div>
            <div class="line-2">2026</div>
            <div class="line-3" id="dynamic-wish">Vạn Sự Như Ý</div>
        </div>

        <div class="horse-container" id="horseRunner">
            <div class="horse">🐎</div>
        </div>
    </div>

    <script>
        // --- 1. KHỞI TẠO ---
        function startTet() {
            document.getElementById("start-screen").style.opacity = 0;
            setTimeout(() => {
                document.getElementById("start-screen").style.display = "none";
                document.getElementById("main-scene").style.display = "block";
                initFireworks();
                startFallingLuck();
                startTextCycle();
                initHorseRun();
                createStarsAndBokeh(); // Tạo sao và bokeh nền
            }, 800);
        }

        // --- 2. HIỆU ỨNG NỀN MỚI (SAO & BOKEH) ---
        function createStarsAndBokeh() {
            const container = document.getElementById('star-container');
            // Tạo sao
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 70 + '%';
                const size = Math.random() * 2 + 1; star.style.width = size + 'px'; star.style.height = size + 'px';
                star.style.animationDuration = Math.random() * 2 + 1 + 's';
                container.appendChild(star);
            }
            // Tạo Bokeh
            const colors = ['#ff5252', '#ffd740', '#64b5f6', '#69f0ae'];
            for (let i = 0; i < 15; i++) {
                const bokeh = document.createElement('div');
                bokeh.className = 'bokeh';
                bokeh.style.left = Math.random() * 100 + '%'; bokeh.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 100 + 50; bokeh.style.width = size + 'px'; bokeh.style.height = size + 'px';
                bokeh.style.background = colors[Math.floor(Math.random() * colors.length)];
                bokeh.style.animationDuration = Math.random() * 10 + 10 + 's';
                container.appendChild(bokeh);
            }
        }

        // --- 3. NGỰA CHẠY 2 CHIỀU (Đã tối ưu) ---
        function initHorseRun() {
            const horseEl = document.getElementById('horseRunner');
            let pos = -200; let direction = 1; const speed = 4;
            function animateHorse() {
                const screenWidth = window.innerWidth;
                if (direction === 1 && pos > screenWidth + 50) { direction = -1; horseEl.style.transform = 'scaleX(1)'; } 
                else if (direction === -1 && pos < -200) { direction = 1; horseEl.style.transform = 'scaleX(-1)'; }
                pos += speed * direction;
                horseEl.style.left = pos + 'px';
                requestAnimationFrame(animateHorse);
            }
            horseEl.style.transform = 'scaleX(-1)'; animateHorse();
        }

        // --- 4. TƯƠNG TÁC CHUỘT & RIPPLE ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
            if(Math.random() > 0.5) {
                const trail = document.createElement('div'); trail.className = 'trail';
                trail.style.left = e.clientX + 'px'; trail.style.top = e.clientY + 'px';
                trail.style.background = `hsl(${Math.random()*60 + 30}, 100%, 80%)`;
                document.body.appendChild(trail); setTimeout(() => trail.remove(), 800);
            }
        });
        document.getElementById('main-scene').addEventListener('mousedown', (e) => {
            cursor.classList.add('clicking');
            // Tạo hiệu ứng Ripple
            const ripple = document.createElement('div'); ripple.className = 'ripple';
            ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple); setTimeout(() => ripple.remove(), 600);

            if(window.fireworksEngine) { window.fireworksEngine.push({ x: e.clientX, y: window.innerHeight, targetY: e.clientY, speed: 12, hue: Math.random() * 360, manual: true }); }
            const words = ["+Tài", "+Lộc", "+Thọ", "+Phúc", "+An", "❤️", "💰"];
            const text = document.createElement('div'); text.className = 'floating-text';
            text.innerText = words[Math.floor(Math.random() * words.length)];
            text.style.left = e.clientX + 'px'; text.style.top = e.clientY + 'px';
            document.body.appendChild(text); setTimeout(() => text.remove(), 1500);
        });
        document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));

        // --- 5. CÁC HIỆU ỨNG KHÁC (Chữ, Mưa lộc, Pháo hoa - Giữ nguyên) ---
        function startTextCycle() {
            const wishes = ["Vạn Sự Như Ý", "Tấn Tài Tấn Lộc", "Sức Khỏe Dồi Dào", "Gia Đạo Bình An", "Mã Đáo Thành Công"]; let index = 0; const el = document.getElementById('dynamic-wish');
            setInterval(() => { index = (index + 1) % wishes.length; el.style.opacity = 0; setTimeout(() => { el.innerText = wishes[index]; el.style.opacity = 1; }, 500); }, 3000);
        }
        function startFallingLuck() {
            const items = ['🌸', '🧧', '💰', '✨', '🏵️'];
            setInterval(() => {
                const el = document.createElement('div'); el.className = 'falling-item'; el.innerText = items[Math.floor(Math.random() * items.length)];
                el.style.left = Math.random() * 100 + 'vw'; el.style.fontSize = Math.random() * 20 + 15 + 'px'; el.style.animationDuration = Math.random() * 3 + 4 + 's';
                document.getElementById('main-scene').appendChild(el); setTimeout(() => el.remove(), 7000);
            }, 300);
        }
        function initFireworks() {
            const canvas = document.getElementById('fireworksCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let fireworks = [], particles = []; window.fireworksEngine = fireworks;
            function animate() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (Math.random() < 0.05) { fireworks.push({x: Math.random()*canvas.width, y: canvas.height, targetY: Math.random()*canvas.height*0.5, speed: Math.random()*5+8, hue: Math.random()*360}); }
                fireworks.forEach((fw, i) => { fw.y -= fw.speed; ctx.beginPath(); ctx.arc(fw.x, fw.y, 3, 0, Math.PI*2); ctx.fillStyle = `hsl(${fw.hue}, 100%, 70%)`; ctx.fill(); if (fw.y <= fw.targetY) { explode(fw.x, fw.y, fw.hue); fireworks.splice(i, 1); } });
                particles.forEach((p, i) => { p.vx *= 0.95; p.vy *= 0.95; p.vy += 0.05; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay; ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); if(p.shape == 'heart') ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); else ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; if (p.alpha <= 0) particles.splice(i, 1); });
                requestAnimationFrame(animate);
            }
            function explode(x, y, hue) { const type = Math.random(); if(type < 0.2) { for(let i=0; i<80; i++) { const a = (i/80)*Math.PI*2; const r=12; const vx = (r * 16 * Math.pow(Math.sin(a), 3))/10; const vy = (-r * (13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a)))/10; particles.push({x:x, y:y, vx:vx, vy:vy, color:`hsl(${hue},100%,60%)`, alpha:1, decay:0.015, size:2, shape:'heart'}); }} else if (type < 0.4) { for(let i=0; i<100; i++) { const a = (i/100)*Math.PI*2; const r = (i%2==0)?8:4; particles.push({x:x, y:y, vx:Math.cos(a)*r, vy:Math.sin(a)*r, color:`hsl(${hue},100%,60%)`, alpha:1, decay:0.02, size:2, shape:'star'}); }} else { for(let i=0; i<60; i++) { const a = Math.random()*Math.PI*2; const s = Math.random()*6+2; particles.push({x:x, y:y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, color:`hsl(${hue},100%,60%)`, alpha:1, decay:0.02, size:Math.random()*3, shape:'circle'}); }}}
            animate(); window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        }
    </script>
</body>
</html>
